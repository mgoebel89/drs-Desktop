{% extends "wizard/_layout.html" %}
{% block step %}
<h2>Schritt 4 · Fobizz-Output einfügen</h2>
<p class="muted">
  Antwort des Agenten hier als Markdown einfügen. Wird beim Speichern in die
  Obsidian-Vault geschrieben (<code>{{ ls.smb_folder_name }}.md</code>).
</p>

<form method="post" action="/wizard/{{ ls.id }}/step/4" style="display:grid;gap:1rem">
  <textarea name="fobizz_output" rows="18"
            placeholder="# Lernsituation: …&#10;## Einstieg…"
            style="font-family:ui-monospace,Menlo,Consolas,monospace;font-size:13px">{{ output }}</textarea>
  <div style="display:flex;justify-content:space-between">
    <a class="btn btn-sec" href="/wizard/{{ ls.id }}/step/3">← Zurück</a>
    <button class="btn" type="submit">Speichern und weiter →</button>
  </div>
</form>
{% endblock %}
