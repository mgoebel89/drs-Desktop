{% extends "base.html" %}
{% block title %}Passwort ändern · DRS{% endblock %}
{% block content %}
<div class="card card-narrow">
  <h1>Passwort ändern</h1>
  {% if forced %}
    <div class="flash flash-warn">Bitte vergib jetzt dein eigenes Passwort.</div>
  {% endif %}
  {% if error %}<div class="flash flash-err">{{ error }}</div>{% endif %}

  <form method="post" action="/change-password">
    <label>Aktuelles Passwort</label>
    <input name="current" type="password" required autocomplete="current-password">
    <label>Neues Passwort (min. 10 Zeichen)</label>
    <input name="new1" type="password" required autocomplete="new-password">
    <label>Neues Passwort wiederholen</label>
    <input name="new2" type="password" required autocomplete="new-password">
    <div style="margin-top:1.3rem">
      <button class="btn" type="submit">Speichern</button>
    </div>
  </form>
</div>
{% endblock %}
